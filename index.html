<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="colors.css">
</head>
<body>
    <header>
        <a href="/" class="header_link">
            <img src="/images/logo-small.svg" alt="">
            <h1>Savings Tracker</h1>       
        </a>
        <button type="button" class="btn_primary bg-orange" id="newGoalBtn">
            <img src="./images/icon-plus.svg">
            <span>New goal</span>
        </button>
    </header>

    <main>
        <section class="user_statistics">
            <div class="stat_card bg-gradient-orange">
                    <span>Total savings</span>
                    <data value="0" id="total_savings_data" class="color-white">$11,249.00</data>
            </div>

            <div class="stat_card bg-gradient-gray">
                <span>Active goals</span>
                <data value="0" id="active_goals_data" class="color-orange">0</data>
            </div>
            <div class="stat_card bg-gradient-gray">
                <span>Goals completed</span>
                <data value="0" id="goals_completed_data" class="color-light-green">0</data>
            </div>
            <div class="stat_card bg-gradient-gray">
                <!-- test for template -->
                <span>Monthly deposits</span>
                <!-- <div class="yearly_stats">
                    <div class="monthly_spendings">
                        <div class="progress_container">
                            <div class="monthly_spendings_progress_bar" id="monthly_vertical_bar"></div>
                        </div>
                        <data value="0">$0</data>
                        <span>Apr</span>
                    </div>
                </div> -->
            </div>
        </section>

        <section class="user_goals">
            <div class="section_header">
                <h2>Your goals</h2>
                <div>
                    <button id="sortByBtn" type="button" class="btn_secondary bg-gradient-gray">
                        <img src="./images/icon-sort.svg" alt="">
                        <span>Sort by</span>
                    </button>
                    
                    <div class="search bg-gradient-gray">
                        <div class="search_icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <circle cx="11" cy="11" r="7" />
                                <line x1="16.5" y1="16.5" x2="21" y2="21" />
                            </svg>
                        </div> 
                        <input 
                            type="text" 
                            class="search_input" 
                            id="searchInput" 
                            placeholder="Поиск..." 
                            autocomplete="off"
                            spellcheck="false"
                        />
                    </div>
                </div>
            </div>
            <div class="goals_list">
                
            </div>
        </section>

        <section class="new_goal_modal" id="newGoalModal">
            <div class="modal_content bg-gradient-gray"> 
                <div class="section_header">
                    <h2>New goal</h2>
                    <button type="button" class="btn_close bg-gradient-gray" id="closeNewGoalModal">
                        &times;
                    </button>
                </div>

                <form action="">
                    <div class="form_group">
                    <label for="goal-title">Goal Title *</label>
                    <input type="text" id="goal-title" required maxlength="100" 
                           placeholder="New Car">
                    <div class="error_message"></div>
                </div>

                <div class="form_group">
                    <label for="goal-target">Target Amount *</label>
                    <input type="number" id="goal-target" required min="0" step="0.1" 
                           placeholder="0.00">
                    <div class="error_message"></div>
                </div>

                <div class="form_group">
                    <label for="goal-current">Current Amount Saved</label>
                    <input type="number" id="goal-current" min="0" step="0.1" 
                           placeholder="0.00" value="0">
                </div>

                <div class="form_group">
                    <label for="goal-currency">Currency</label>
                    <select id="goal-currency">
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="RUB">RUB (₽)</option>
                        <option value="JPY">JPY (¥)</option>
                    </select>
                </div>

                <div class="form_group">
                    <label for="goal-deadline">Target Date</label>
                    <input type="date" id="goal-deadline">
                </div>

                <div class="form_group">
                    <label for="goal-category">Category</label>
                    <select id="goal-category">
                        <option value="general">General</option>
                        <option value="savings">Savings</option>
                        <option value="investment">Investment</option>
                        <option value="debt">Debt Repayment</option>
                        <option value="education">Education</option>
                        <option value="travel">Travel</option>
                        <option value="home">Home</option>
                        <option value="vehicle">Vehicle</option>
                        <option value="retirement">Retirement</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form_group">
                    <label for="goal-priority">Priority</label>
                    <select id="goal-priority">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="form_group">
                    <label for="goal-description">Description</label>
                    <textarea id="goal-description" 
                              placeholder="Describe your goal and motivation..."></textarea>
                </div>
                </form>


                <button type="button" class="btn_primary bg-orange">
                    <img src="./images/icon-plus.svg">
                    <span>Add goal</span>
                </button>
            </div>
        </section>
    </main>
    <script src="vanilla-tilt.min.js"></script>
    <script src="ui.js"></script>
    
</body>
</html>
